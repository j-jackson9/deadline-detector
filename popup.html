<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="popup.css" rel="stylesheet"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>DueFlow</title>
</head>
<body>
    <div class="popup">
        <div class="header">
            <img src="due-flow-2.png"/> 
            <div class="beta-box">
                <span class="beta-text">Beta</span>
            </div>
        </div>
        <div class="content">
            <div class="text">
                <h1 class="bell-icon">🔔</h1>
                <h1 class="deadline-date"></h1>
            </div>
            <div class="countdown">ℹ️
                <span></span>
            </div>
        </div> 
        <div class="button-options">
            <button class="copy"><i class="fa-solid fa-copy"></i>Copy Deadline</button>
            <button class="add-to-calendar"><i class="fa-solid fa-calendar-plus"></i>Add to Calendar</button>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
